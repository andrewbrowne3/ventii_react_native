# Reverse proxy for ventii.andrewbrowne.org
# HTTP :80 serves the ACME challenge and redirects everything else to HTTPS.
# HTTPS :443 terminates TLS and proxies to the Django (gunicorn) container.

server {
    listen 80;
    server_name ventii.andrewbrowne.org;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ventii.andrewbrowne.org;

    ssl_certificate     /etc/letsencrypt/live/ventii.andrewbrowne.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventii.andrewbrowne.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/static/;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
